<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Plateful</title>
<meta name="description" content="Track meals, hit your deficit, day by day." />

<!-- PWA setup -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2F5D50" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  html, body { margin: 0; padding: 0; background: #FBF8F3; }
  body { background: radial-gradient(circle at 20% -10%, #F3ECDD 0%, #FBF8F3 55%); }
  * { box-sizing: border-box; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid #2F5D50; outline-offset: 2px; }

</head>
<body>
<div id="root"></div>

<!-- React (classic scripts, attach to window.React / window.ReactDOM) -->
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>

<!-- App code: plain ES module, no build step, no in-browser transpiler -->
<script type="module">
import htm from "https://unpkg.com/htm@3.1.1?module";

const html = htm.bind(React.createElement);
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// TODO: Replace with your own Google Client ID from Google Cloud Console (see setup guide)
const GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID_HERE.apps.googleusercontent.com";

function decodeJwt(token) {
  const base64Url = token.split(".")[1];
  const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
  const jsonPayload = decodeURIComponent(
    atob(base64)
      .split("")
      .map((c) => "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2))
      .join("")
  );
  return JSON.parse(jsonPayload);
}

// ---- Local storage helper ----
const storage = {
  async get(key) {
    const raw = window.localStorage.getItem(key);
    if (raw === null) return null;
    return { key, value: raw };
  },
  async set(key, value) {
    window.localStorage.setItem(key, value);
    return { key, value };
  },
};

const MEAL_TYPES = ["Breakfast", "Lunch", "Dinner", "Snacks"];
const DEFAULT_SETTINGS = { calorieGoal: 1800, proteinGoal: 120, carbGoal: 170, fatGoal: 55, weightUnit: "kg" };
const EMPTY_ITEM_FORM = { name: "", calories: "", protein: "", carbs: "", fat: "" };
const EMPTY_WEIGHT_FORM = { weight: "" };

function todayStr() { return new Date().toISOString().slice(0, 10); }

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const today = todayStr();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yestStr = yest.toISOString().slice(0, 10);
  const tom = new Date(); tom.setDate(tom.getDate() + 1);
  const tomStr = tom.toISOString().slice(0, 10);
  if (dateStr === today) return "Today";
  if (dateStr === yestStr) return "Yesterday";
  if (dateStr === tomStr) return "Tomorrow";
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}

function addDays(dateStr, delta) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + delta);
  return d.toISOString().slice(0, 10);
}

const inputStyle = { width: "100%", padding: "10px 12px", borderRadius: 10, border: "1px solid #E5DDCF", fontSize: 14, fontFamily: "inherit", background: "#FBF8F3", color: "#262220" };
const labelStyle = { display: "block", fontSize: 12, fontWeight: 600, color: "#8A8175", marginTop: 12, marginBottom: 6 };

// ---- Simple text-based icons (no external icon library) ----
function Icon({ children, size, color }) {
  return html`<span style=${{ fontSize: size || 16, lineHeight: 1, color: color || "inherit", display: "inline-flex", alignItems: "center", justifyContent: "center" }}>${children}</span>`;
}
const Plus = (p) => html`<${Icon} ...${p}>+<//>`;
const Trash2 = (p) => html`<${Icon} ...${p}>🗑<//>`;
const SettingsIconCmp = (p) => html`<${Icon} ...${p}>⚙<//>`;
const ChevronLeft = (p) => html`<${Icon} ...${p}>‹<//>`;
const ChevronRight = (p) => html`<${Icon} ...${p}>›<//>`;
const XIcon = (p) => html`<${Icon} ...${p}>✕<//>`;
const CalendarDays = (p) => html`<${Icon} ...${p}>📅<//>`;
const UtensilsCrossed = (p) => html`<${Icon} ...${p}>🍽<//>`;
const Check = (p) => html`<${Icon} ...${p}>✓<//>`;
const Scale = (p) => html`<${Icon} ...${p}>⚖️<//>`;
const LogOut = (p) => html`<${Icon} ...${p}>↪<//>`;

function Ring({ size, stroke, pct, color, trackColor }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const clamped = Math.max(0, Math.min(1, pct));
  const offset = c * (1 - clamped);
  return html`
    <svg width=${size} height=${size} style=${{ transform: "rotate(-90deg)" }}>
      <circle cx=${size / 2} cy=${size / 2} r=${r} fill="none" stroke=${trackColor} stroke-width=${stroke} />
      <circle
        cx=${size / 2}
        cy=${size / 2}
        r=${r}
        fill="none"
        stroke=${color}
        stroke-width=${stroke}
        stroke-dasharray=${c}
        stroke-dashoffset=${offset}
        stroke-linecap="round"
        style=${{ transition: "stroke-dashoffset 0.5s ease" }}
      />
    </svg>
  `;
}

function MacroRing({ label, consumed, goal, color }) {
  const pct = goal > 0 ? consumed / goal : 0;
  return html`
    <div style=${{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
      <div style=${{ position: "relative", width: 74, height: 74 }}>
        <${Ring} size=${74} stroke=${8} pct=${pct} color=${color} trackColor="#EDE6DA" />
        <div style=${{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Fraunces', serif", fontSize: 15, fontWeight: 600, color: "#262220" }}>
          ${Math.round(consumed)}
        </div>
      </div>
      <div style=${{ textAlign: "center" }}>
        <div style=${{ fontSize: 12, fontWeight: 600, color: "#262220", letterSpacing: 0.3 }}>${label}</div>
        <div style=${{ fontSize: 11, color: "#8A8175", fontVariantNumeric: "tabular-nums" }}>of ${Math.round(goal)}g</div>
      </div>
    </div>
  `;
}

function ItemForm({ values, onChange, onSubmit, onCancel, submitLabel }) {
  return html`
    <form onSubmit=${onSubmit} style=${{ background: "#FBF8F3", border: "1px solid #E5DDCF", borderRadius: 14, padding: 14, marginTop: 8 }}>
      <input type="text" placeholder="Food name" value=${values.name} onInput=${(e) => onChange("name", e.target.value)} style=${inputStyle} />
      <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginTop: 8 }}>
        <input type="number" placeholder="Cals" value=${values.calories} onInput=${(e) => onChange("calories", e.target.value)} style=${inputStyle} />
        <input type="number" placeholder="Protein g" value=${values.protein} onInput=${(e) => onChange("protein", e.target.value)} style=${inputStyle} />
        <input type="number" placeholder="Carbs g" value=${values.carbs} onInput=${(e) => onChange("carbs", e.target.value)} style=${inputStyle} />
        <input type="number" placeholder="Fat g" value=${values.fat} onInput=${(e) => onChange("fat", e.target.value)} style=${inputStyle} />
      </div>
      <div style=${{ display: "flex", gap: 8, marginTop: 10 }}>
        <button type="submit" style=${{ flex: 1, background: "#2F5D50", color: "#fff", border: "none", borderRadius: 10, padding: "9px 0", fontSize: 13, fontWeight: 700 }}>${submitLabel}</button>
        <button type="button" onClick=${onCancel} style=${{ background: "#fff", border: "1px solid #E5DDCF", borderRadius: 10, padding: "9px 16px", fontSize: 13, fontWeight: 600, color: "#8A8175" }}>Cancel</button>
      </div>
    </form>
  `;
}

function WelcomeScreen({ onSignIn, onSkip }) {
  const btnRef = useRef(null);

  useEffect(() => {
    let cancelled = false;
    function tryInit() {
      if (cancelled) return;
      if (window.google && window.google.accounts && window.google.accounts.id && btnRef.current) {
        try {
          window.google.accounts.id.initialize({
            client_id: GOOGLE_CLIENT_ID,
            callback: (response) => {
              try {
                const profile = decodeJwt(response.credential);
                onSignIn({ name: profile.given_name || profile.name || "there", picture: profile.picture || "", email: profile.email || "" });
              } catch (e) {
                onSignIn({ name: "there", picture: "", email: "" });
              }
            },
          });
          window.google.accounts.id.renderButton(btnRef.current, { theme: "filled_black", size: "large", shape: "pill", width: 260, text: "continue_with" });
        } catch (e) {}
      } else {
        setTimeout(tryInit, 300);
      }
    }
    tryInit();
    return () => { cancelled = true; };
  }, []);

  return html`
    <div class="fade-in" style=${{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px", textAlign: "center" }}>
      <div style=${{ fontSize: 46, marginBottom: 6 }}>🍽️</div>
      <h1 style=${{ fontFamily: "'Fraunces', serif", fontSize: 34, fontWeight: 700, margin: "0 0 8px", color: "#262220" }}>Welcome to Plateful</h1>
      <p style=${{ fontSize: 15, color: "#8A8175", maxWidth: 320, lineHeight: 1.6, marginBottom: 32 }}>
        A cozy little place to track meals, plan ahead, and watch your progress add up — one plate at a time.
      </p>
      <div ref=${btnRef}></div>
      <button onClick=${onSkip} style=${{ marginTop: 18, background: "none", border: "none", color: "#8A8175", fontSize: 13, fontWeight: 600, textDecoration: "underline", textUnderlineOffset: "3px" }}>
        Continue without signing in
      </button>
    </div>
  `;
}

function WeightChart({ entries, unit }) {
  if (!entries || entries.length < 2) return null;
  const w = 500, h = 160, padX = 20, padY = 20;
  const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date)).slice(-20);
  const weights = sorted.map((e) => e.weight);
  const min = Math.min(...weights);
  const max = Math.max(...weights);
  const range = max - min || 1;
  const stepX = sorted.length > 1 ? (w - padX * 2) / (sorted.length - 1) : 0;
  const points = sorted.map((e, i) => ({
    x: padX + i * stepX,
    y: padY + (1 - (e.weight - min) / range) * (h - padY * 2),
  }));
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");

  return html`
    <svg viewBox="0 0 ${w} ${h}" style=${{ width: "100%", height: 160 }}>
      <path d=${pathD} fill="none" stroke="#2F5D50" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      ${points.map((p, i) => html`<circle key=${i} cx=${p.x} cy=${p.y} r="3.5" fill="#2F5D50" />`)}
      <text x=${points[0].x} y=${h - 4} font-size="11" fill="#8A8175">${formatDateLabel(sorted[0].date)}</text>
      <text x=${points[points.length - 1].x} y=${h - 4} font-size="11" fill="#8A8175" text-anchor="end">${formatDateLabel(sorted[sorted.length - 1].date)}</text>
      <text x=${w - padX} y=${padY} font-size="11" fill="#8A8175" text-anchor="end">${max}${unit}</text>
      <text x=${w - padX} y=${h - padY} font-size="11" fill="#8A8175" text-anchor="end">${min}${unit}</text>
    </svg>
  `;
}

function MainApp({ user, onSignOut }) {
  const [date, setDate] = useState(todayStr());
  const [view, setView] = useState("log");
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [entries, setEntries] = useState([]);
  const [planEntries, setPlanEntries] = useState([]);
  const [weights, setWeights] = useState([]);
  const [weightForm, setWeightForm] = useState(EMPTY_WEIGHT_FORM);
  const [weightError, setWeightError] = useState("");
  const [loading, setLoading] = useState(true);
  const [showSettings, setShowSettings] = useState(false);
  const [draftSettings, setDraftSettings] = useState(DEFAULT_SETTINGS);
  const [form, setForm] = useState({ mealType: "Breakfast", ...EMPTY_ITEM_FORM });
  const [addingSlot, setAddingSlot] = useState(null);
  const [planForm, setPlanForm] = useState(EMPTY_ITEM_FORM);
  const [error, setError] = useState("");
  const [planError, setPlanError] = useState("");

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get("plateful:weights");
        setWeights(res && res.value ? JSON.parse(res.value) : []);
      } catch (e) { setWeights([]); }
    })();
  }, []);

  useEffect(() => {
    const existing = weights.find((w) => w.date === date);
    setWeightForm({ weight: existing ? String(existing.weight) : "" });
    setWeightError("");
  }, [date, weights]);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get("plateful:settings");
        if (res && res.value) {
          setSettings(JSON.parse(res.value));
          setDraftSettings(JSON.parse(res.value));
        }
      } catch (e) {}
    })();
  }, []);

  useEffect(() => {
    setLoading(true);
    (async () => {
      try {
        const [logRes, planRes] = await Promise.all([storage.get(`plateful:log:${date}`), storage.get(`plateful:plan:${date}`)]);
        setEntries(logRes && logRes.value ? JSON.parse(logRes.value) : []);
        setPlanEntries(planRes && planRes.value ? JSON.parse(planRes.value) : []);
      } catch (e) {
        setEntries([]); setPlanEntries([]);
      } finally { setLoading(false); }
    })();
    setAddingSlot(null);
    setPlanError("");
  }, [date]);

  const saveEntries = useCallback(async (next) => {
    setEntries(next);
    try { await storage.set(`plateful:log:${date}`, JSON.stringify(next)); }
    catch (e) { setError("Couldn't save — try again."); }
  }, [date]);

  const savePlanEntries = useCallback(async (next) => {
    setPlanEntries(next);
    try { await storage.set(`plateful:plan:${date}`, JSON.stringify(next)); }
    catch (e) { setPlanError("Couldn't save plan — try again."); }
  }, [date]);

  const saveWeights = useCallback(async (next) => {
    setWeights(next);
    try { await storage.set("plateful:weights", JSON.stringify(next)); }
    catch (e) { setWeightError("Couldn't save — try again."); }
  }, []);

  async function handleAddWeight(e) {
    e.preventDefault();
    setWeightError("");
    if (weightForm.weight === "" || isNaN(Number(weightForm.weight))) { setWeightError("Enter a weight."); return; }
    const w = Number(weightForm.weight);
    const existingIdx = weights.findIndex((x) => x.date === date);
    let next;
    if (existingIdx >= 0) {
      next = weights.map((x, i) => (i === existingIdx ? { ...x, weight: w } : x));
    } else {
      next = [...weights, { id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, date, weight: w }];
    }
    await saveWeights(next);
  }

  async function handleDeleteWeight(id) { await saveWeights(weights.filter((w) => w.id !== id)); }

  const totals = useMemo(() => entries.reduce((acc, e) => ({
    calories: acc.calories + Number(e.calories || 0),
    protein: acc.protein + Number(e.protein || 0),
    carbs: acc.carbs + Number(e.carbs || 0),
    fat: acc.fat + Number(e.fat || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0 }), [entries]);

  const remaining = settings.calorieGoal - totals.calories;

  function handleFormChange(field, value) { setForm((f) => ({ ...f, [field]: value })); }

  async function handleAddEntry(e) {
    e.preventDefault();
    setError("");
    if (!form.name.trim()) { setError("Give the item a name."); return; }
    if (form.calories === "" || isNaN(Number(form.calories))) { setError("Enter a calorie amount."); return; }
    const entry = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      mealType: form.mealType, name: form.name.trim(),
      calories: Number(form.calories) || 0, protein: Number(form.protein) || 0,
      carbs: Number(form.carbs) || 0, fat: Number(form.fat) || 0,
    };
    await saveEntries([...entries, entry]);
    setForm({ mealType: form.mealType, ...EMPTY_ITEM_FORM });
  }

  async function handleDelete(id) { await saveEntries(entries.filter((e) => e.id !== id)); }

  async function handleSaveSettings() {
    const clean = {
      calorieGoal: Number(draftSettings.calorieGoal) || 0,
      proteinGoal: Number(draftSettings.proteinGoal) || 0,
      carbGoal: Number(draftSettings.carbGoal) || 0,
      fatGoal: Number(draftSettings.fatGoal) || 0,
      weightUnit: draftSettings.weightUnit || "kg",
    };
    setSettings(clean);
    try { await storage.set("plateful:settings", JSON.stringify(clean)); }
    catch (e) { setError("Couldn't save settings — try again."); }
    setShowSettings(false);
  }

  function openPlanForm(mealType) { setPlanForm(EMPTY_ITEM_FORM); setPlanError(""); setAddingSlot(mealType); }

  async function handleAddPlanEntry(e, mealType) {
    e.preventDefault();
    setPlanError("");
    if (!planForm.name.trim()) { setPlanError("Give the item a name."); return; }
    const item = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      mealType, name: planForm.name.trim(),
      calories: Number(planForm.calories) || 0, protein: Number(planForm.protein) || 0,
      carbs: Number(planForm.carbs) || 0, fat: Number(planForm.fat) || 0,
      addedToLog: false,
    };
    await savePlanEntries([...planEntries, item]);
    setAddingSlot(null);
  }

  async function handleDeletePlanEntry(id) { await savePlanEntries(planEntries.filter((p) => p.id !== id)); }

  async function handleAddPlannedToLog(item) {
    const entry = {
      id: `${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
      mealType: item.mealType, name: item.name,
      calories: item.calories, protein: item.protein, carbs: item.carbs, fat: item.fat,
    };
    await saveEntries([...entries, entry]);
    await savePlanEntries(planEntries.map((p) => (p.id === item.id ? { ...p, addedToLog: true } : p)));
  }

  const grouped = MEAL_TYPES.map((type) => ({ type, items: entries.filter((e) => e.mealType === type) }));
  const plannedGrouped = MEAL_TYPES.map((type) => ({ type, items: planEntries.filter((p) => p.mealType === type) }));
  const unloggedPlanItems = planEntries.filter((p) => !p.addedToLog);
  const caloriePct = settings.calorieGoal > 0 ? totals.calories / settings.calorieGoal : 0;

  const mealTypeButtons = html`
    <div style=${{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
      ${MEAL_TYPES.map((t) => html`
        <button type="button" key=${t} onClick=${() => handleFormChange("mealType", t)}
          style=${{ padding: "6px 14px", borderRadius: 999, border: form.mealType === t ? "1px solid #2F5D50" : "1px solid #E5DDCF", background: form.mealType === t ? "#2F5D50" : "#fff", color: form.mealType === t ? "#fff" : "#262220", fontSize: 13, fontWeight: 600 }}>
          ${t}
        </button>
      `)}
    </div>
  `;

  const logView = html`
    <div>
      <div style=${{ background: "#fff", border: "1px solid #EDE6DA", borderRadius: 20, padding: "26px 20px", marginBottom: 22 }}>
        <div style=${{ fontSize: 12, fontWeight: 700, letterSpacing: 1, color: "#8A8175", textTransform: "uppercase", textAlign: "center", marginBottom: 14 }}>${formatDateLabel(date)}'s Plate</div>
        <div style=${{ display: "flex", justifyContent: "center", marginBottom: 22 }}>
          <div style=${{ position: "relative", width: 168, height: 168 }}>
            <${Ring} size=${168} stroke=${14} pct=${caloriePct} color=${caloriePct > 1 ? "#A85736" : "#2F5D50"} trackColor="#EDE6DA" />
            <div style=${{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
              <div style=${{ fontFamily: "'Fraunces', serif", fontSize: 34, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>${Math.abs(Math.round(remaining))}</div>
              <div style=${{ fontSize: 12, color: "#8A8175", fontWeight: 500 }}>${remaining >= 0 ? "kcal left" : "kcal over"}</div>
            </div>
          </div>
        </div>
        <div style=${{ display: "flex", justifyContent: "center", gap: 28 }}>
          <${MacroRing} label="Protein" consumed=${totals.protein} goal=${settings.proteinGoal} color="#A85736" />
          <${MacroRing} label="Carbs" consumed=${totals.carbs} goal=${settings.carbGoal} color="#C99A2E" />
          <${MacroRing} label="Fat" consumed=${totals.fat} goal=${settings.fatGoal} color="#55738C" />
        </div>
      </div>

      ${unloggedPlanItems.length > 0 ? html`
        <div style=${{ background: "#fff", border: "1px solid #EDE6DA", borderRadius: 20, padding: 18, marginBottom: 22 }}>
          <div style=${{ fontSize: 12, fontWeight: 700, letterSpacing: 1, color: "#8A8175", textTransform: "uppercase", marginBottom: 10 }}>Planned for ${formatDateLabel(date).toLowerCase()}</div>
          ${unloggedPlanItems.map((item) => html`
            <div key=${item.id} style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 4px", borderBottom: "1px solid #F2ECE1" }}>
              <div>
                <div style=${{ fontSize: 14, fontWeight: 600 }}>${item.name}</div>
                <div style=${{ fontSize: 12, color: "#8A8175" }}>${item.mealType} &middot; ${item.calories} kcal</div>
              </div>
              <button onClick=${() => handleAddPlannedToLog(item)} style=${{ background: "#2F5D50", color: "#fff", border: "none", borderRadius: 9, padding: "7px 12px", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                <${Plus} size=${13} /> Add to log
              </button>
            </div>
          `)}
        </div>
      ` : ""}

      <form onSubmit=${handleAddEntry} style=${{ background: "#fff", border: "1px solid #EDE6DA", borderRadius: 20, padding: 20, marginBottom: 22 }}>
        <div style=${{ fontSize: 12, fontWeight: 700, letterSpacing: 1, color: "#8A8175", textTransform: "uppercase", marginBottom: 12 }}>Log a meal</div>
        ${mealTypeButtons}
        <input type="text" placeholder="Food name (e.g. Grilled chicken salad)" value=${form.name} onInput=${(e) => handleFormChange("name", e.target.value)} style=${inputStyle} />
        <div style=${{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginTop: 8 }}>
          <input type="number" placeholder="Cals" value=${form.calories} onInput=${(e) => handleFormChange("calories", e.target.value)} style=${inputStyle} />
          <input type="number" placeholder="Protein g" value=${form.protein} onInput=${(e) => handleFormChange("protein", e.target.value)} style=${inputStyle} />
          <input type="number" placeholder="Carbs g" value=${form.carbs} onInput=${(e) => handleFormChange("carbs", e.target.value)} style=${inputStyle} />
          <input type="number" placeholder="Fat g" value=${form.fat} onInput=${(e) => handleFormChange("fat", e.target.value)} style=${inputStyle} />
        </div>
        ${error ? html`<div style=${{ color: "#A85736", fontSize: 13, marginTop: 8 }}>${error}</div>` : ""}
        <button type="submit" style=${{ marginTop: 12, width: "100%", background: "#2F5D50", color: "#fff", border: "none", borderRadius: 12, padding: "12px 0", fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
          <${Plus} size=${16} /> Add to ${form.mealType}
        </button>
      </form>

      ${loading ? html`
        <div style=${{ textAlign: "center", color: "#8A8175", fontSize: 14, padding: 20 }}>Loading...</div>
      ` : entries.length === 0 ? html`
        <div style=${{ textAlign: "center", color: "#8A8175", fontSize: 14, padding: "30px 20px", border: "1px dashed #E5DDCF", borderRadius: 16 }}>Nothing logged for this day yet. Add your first meal above.</div>
      ` : grouped.filter((g) => g.items.length > 0).map((g) => html`
        <div key=${g.type} style=${{ marginBottom: 18 }}>
          <div style=${{ fontSize: 12, fontWeight: 700, letterSpacing: 1, color: "#8A8175", textTransform: "uppercase", marginBottom: 8 }}>${g.type}</div>
          ${g.items.map((item) => html`
            <div key=${item.id} style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#fff", border: "1px solid #EDE6DA", borderRadius: 14, padding: "12px 14px", marginBottom: 8 }}>
              <div>
                <div style=${{ fontSize: 14, fontWeight: 600 }}>${item.name}</div>
                <div style=${{ fontSize: 12, color: "#8A8175", fontVariantNumeric: "tabular-nums" }}>${item.calories} kcal &middot; P${item.protein} C${item.carbs} F${item.fat}</div>
              </div>
              <button onClick=${() => handleDelete(item.id)} style=${{ background: "none", border: "none", padding: 6, display: "flex" }}>
                <${Trash2} size=${16} color="#C4A79A" />
              </button>
            </div>
          `)}
        </div>
      `)}
    </div>
  `;

  const planView = html`
    <div>
      <div style=${{ marginBottom: 16, fontSize: 13, color: "#8A8175", lineHeight: 1.5 }}>
        Schedule what you plan to eat on <strong style=${{ color: "#262220" }}>${formatDateLabel(date).toLowerCase()}</strong>. Use the arrows above to plan other days ahead, then tap "Add to log" from the Log tab when you actually eat it.
      </div>
      ${plannedGrouped.map((slot) => html`
        <div key=${slot.type} style=${{ background: "#fff", border: "1px solid #EDE6DA", borderRadius: 18, padding: 16, marginBottom: 14 }}>
          <div style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: slot.items.length > 0 || addingSlot === slot.type ? 10 : 0 }}>
            <div style=${{ fontSize: 13, fontWeight: 700, color: "#262220" }}>${slot.type}</div>
            ${addingSlot !== slot.type ? html`
              <button onClick=${() => openPlanForm(slot.type)} style=${{ display: "flex", alignItems: "center", gap: 4, background: "none", border: "none", color: "#2F5D50", fontSize: 13, fontWeight: 700 }}>
                <${Plus} size=${14} /> Add
              </button>
            ` : ""}
          </div>
          ${slot.items.map((item) => html`
            <div key=${item.id} style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", borderTop: "1px solid #F2ECE1" }}>
              <div style=${{ display: "flex", alignItems: "center", gap: 8 }}>
                ${item.addedToLog ? html`<${Check} size=${14} color="#2F5D50" />` : ""}
                <div>
                  <div style=${{ fontSize: 14, fontWeight: 600 }}>${item.name}</div>
                  <div style=${{ fontSize: 12, color: "#8A8175" }}>${item.calories} kcal &middot; P${item.protein} C${item.carbs} F${item.fat}</div>
                </div>
              </div>
              <button onClick=${() => handleDeletePlanEntry(item.id)} style=${{ background: "none", border: "none", padding: 6, display: "flex" }}>
                <${Trash2} size=${15} color="#C4A79A" />
              </button>
            </div>
          `)}
          ${addingSlot === slot.type ? html`
            <${ItemForm}
              values=${planForm}
              onChange=${(field, value) => setPlanForm((f) => ({ ...f, [field]: value }))}
              onSubmit=${(e) => handleAddPlanEntry(e, slot.type)}
              onCancel=${() => setAddingSlot(null)}
              submitLabel=${`Add to ${slot.type}`}
            />
          ` : ""}
        </div>
      `)}
      ${planError ? html`<div style=${{ color: "#A85736", fontSize: 13, marginTop: 4 }}>${planError}</div>` : ""}
    </div>
  `;

  const sortedWeightsDesc = [...weights].sort((a, b) => b.date.localeCompare(a.date));

  const weightView = html`
    <div>
      <div style=${{ background: "#fff", border: "1px solid #EDE6DA", borderRadius: 20, padding: 20, marginBottom: 22 }}>
        <div style=${{ fontSize: 12, fontWeight: 700, letterSpacing: 1, color: "#8A8175", textTransform: "uppercase", marginBottom: 14 }}>Weight trend</div>
        ${weights.length >= 2 ? html`<${WeightChart} entries=${weights} unit=${settings.weightUnit} />` : html`
          <div style=${{ textAlign: "center", color: "#8A8175", fontSize: 13, padding: "20px 10px" }}>Log a couple of entries to see your trend line here.</div>
        `}
      </div>

      <form onSubmit=${handleAddWeight} style=${{ background: "#fff", border: "1px solid #EDE6DA", borderRadius: 20, padding: 20, marginBottom: 22 }}>
        <div style=${{ fontSize: 12, fontWeight: 700, letterSpacing: 1, color: "#8A8175", textTransform: "uppercase", marginBottom: 12 }}>Weight for ${formatDateLabel(date).toLowerCase()}</div>
        <div style=${{ display: "flex", gap: 8 }}>
          <input type="number" step="0.1" placeholder=${`Weight (${settings.weightUnit})`} value=${weightForm.weight} onInput=${(e) => setWeightForm({ weight: e.target.value })} style=${inputStyle} />
          <button type="submit" style=${{ background: "#2F5D50", color: "#fff", border: "none", borderRadius: 10, padding: "0 20px", fontSize: 14, fontWeight: 700, flexShrink: 0 }}>Save</button>
        </div>
        ${weightError ? html`<div style=${{ color: "#A85736", fontSize: 13, marginTop: 8 }}>${weightError}</div>` : ""}
      </form>

      ${sortedWeightsDesc.length === 0 ? html`
        <div style=${{ textAlign: "center", color: "#8A8175", fontSize: 14, padding: "30px 20px", border: "1px dashed #E5DDCF", borderRadius: 16 }}>No weight entries yet.</div>
      ` : sortedWeightsDesc.map((w) => html`
        <div key=${w.id} style=${{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#fff", border: "1px solid #EDE6DA", borderRadius: 14, padding: "12px 14px", marginBottom: 8 }}>
          <div style=${{ fontSize: 14, fontWeight: 600 }}>${formatDateLabel(w.date)}</div>
          <div style=${{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style=${{ fontSize: 14, fontVariantNumeric: "tabular-nums" }}>${w.weight} ${settings.weightUnit}</div>
            <button onClick=${() => handleDeleteWeight(w.id)} style=${{ background: "none", border: "none", padding: 4, display: "flex" }}>
              <${Trash2} size=${15} color="#C4A79A" />
            </button>
          </div>
        </div>
      `)}
    </div>
  `;

  const settingsModal = showSettings ? html`
    <div style=${{ position: "fixed", inset: 0, background: "rgba(38,34,32,0.4)", display: "flex", alignItems: "center", justifyContent: "center", padding: 20, zIndex: 50 }} onClick=${() => setShowSettings(false)}>
      <div onClick=${(e) => e.stopPropagation()} style=${{ background: "#FBF8F3", borderRadius: 20, padding: 24, width: "100%", maxWidth: 360 }}>
        <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style=${{ fontFamily: "'Fraunces', serif", fontSize: 20, fontWeight: 700 }}>Daily targets</div>
          <button onClick=${() => setShowSettings(false)} style=${{ background: "none", border: "none", display: "flex" }}>
            <${XIcon} size=${20} color="#8A8175" />
          </button>
        </div>
        <label style=${labelStyle}>Calorie goal (kcal)</label>
        <input type="number" value=${draftSettings.calorieGoal} onInput=${(e) => setDraftSettings((s) => ({ ...s, calorieGoal: e.target.value }))} style=${inputStyle} />
        <label style=${labelStyle}>Protein goal (g)</label>
        <input type="number" value=${draftSettings.proteinGoal} onInput=${(e) => setDraftSettings((s) => ({ ...s, proteinGoal: e.target.value }))} style=${inputStyle} />
        <label style=${labelStyle}>Carb goal (g)</label>
        <input type="number" value=${draftSettings.carbGoal} onInput=${(e) => setDraftSettings((s) => ({ ...s, carbGoal: e.target.value }))} style=${inputStyle} />
        <label style=${labelStyle}>Fat goal (g)</label>
        <input type="number" value=${draftSettings.fatGoal} onInput=${(e) => setDraftSettings((s) => ({ ...s, fatGoal: e.target.value }))} style=${inputStyle} />
        <label style=${labelStyle}>Weight unit</label>
        <div style=${{ display: "flex", gap: 8 }}>
          ${["kg", "lb"].map((u) => html`
            <button type="button" key=${u} onClick=${() => setDraftSettings((s) => ({ ...s, weightUnit: u }))}
              style=${{ flex: 1, padding: "8px 0", borderRadius: 999, border: draftSettings.weightUnit === u ? "1px solid #2F5D50" : "1px solid #E5DDCF", background: draftSettings.weightUnit === u ? "#2F5D50" : "#fff", color: draftSettings.weightUnit === u ? "#fff" : "#262220", fontSize: 13, fontWeight: 600 }}>
              ${u}
            </button>
          `)}
        </div>
        <p style=${{ fontSize: 12, color: "#8A8175", marginTop: 10, lineHeight: 1.5 }}>
          A common starting point for gradual weight loss is a moderate calorie deficit combined with enough protein to preserve muscle — adjust these to whatever your own plan calls for.
        </p>
        <button onClick=${handleSaveSettings} style=${{ marginTop: 10, width: "100%", background: "#2F5D50", color: "#fff", border: "none", borderRadius: 12, padding: "12px 0", fontSize: 14, fontWeight: 700 }}>Save targets</button>
        ${user && !user.guest ? html`
          <button onClick=${onSignOut} style=${{ marginTop: 10, width: "100%", background: "none", color: "#A85736", border: "1px solid #EAD9CE", borderRadius: 12, padding: "10px 0", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
            <${LogOut} size=${14} /> Sign out
          </button>
        ` : ""}
      </div>
    </div>
  ` : "";

  return html`
    <div style=${{ fontFamily: "'Inter', sans-serif", background: "#FBF8F3", color: "#262220", minHeight: "100vh", padding: "28px 20px 48px", maxWidth: 560, margin: "0 auto" }}>
      <div style=${{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 22 }}>
        <div>
          <h1 style=${{ fontFamily: "'Fraunces', serif", fontSize: 30, fontWeight: 700, margin: 0, letterSpacing: -0.5 }}>Plateful</h1>
          <p style=${{ margin: "4px 0 0", fontSize: 13, color: "#8A8175" }}>${user && user.name ? `Welcome back, ${user.name} 👋` : "Track meals, hit your deficit, day by day."}</p>
        </div>
        <div style=${{ display: "flex", alignItems: "center", gap: 10 }}>
          ${user && user.picture ? html`<img src=${user.picture} alt="" style=${{ width: 36, height: 36, borderRadius: "50%", border: "1px solid #E5DDCF" }} />` : ""}
          <button onClick=${() => { setDraftSettings(settings); setShowSettings(true); }}
            style=${{ background: "#fff", border: "1px solid #E5DDCF", borderRadius: 10, width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <${SettingsIconCmp} size=${18} color="#262220" />
          </button>
        </div>
      </div>

      <div style=${{ display: "flex", alignItems: "center", justifyContent: "center", gap: 14, marginBottom: 16 }}>
        <button onClick=${() => setDate((d) => addDays(d, -1))} style=${{ background: "none", border: "none", padding: 6, display: "flex" }}>
          <${ChevronLeft} size=${20} color="#8A8175" />
        </button>
        <div style=${{ fontSize: 15, fontWeight: 600, minWidth: 130, textAlign: "center" }}>${formatDateLabel(date)}</div>
        <button onClick=${() => setDate((d) => addDays(d, 1))} style=${{ background: "none", border: "none", padding: 6, display: "flex" }}>
          <${ChevronRight} size=${20} color="#8A8175" />
        </button>
      </div>

      <div style=${{ display: "flex", background: "#EDE6DA", borderRadius: 12, padding: 4, marginBottom: 22 }}>
        <button onClick=${() => setView("log")} style=${{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "9px 0", borderRadius: 9, border: "none", background: view === "log" ? "#fff" : "transparent", color: view === "log" ? "#262220" : "#8A8175", fontSize: 13, fontWeight: 700, boxShadow: view === "log" ? "0 1px 2px rgba(0,0,0,0.06)" : "none" }}>
          <${UtensilsCrossed} size=${14} /> Log
        </button>
        <button onClick=${() => setView("plan")} style=${{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "9px 0", borderRadius: 9, border: "none", background: view === "plan" ? "#fff" : "transparent", color: view === "plan" ? "#262220" : "#8A8175", fontSize: 13, fontWeight: 700, boxShadow: view === "plan" ? "0 1px 2px rgba(0,0,0,0.06)" : "none" }}>
          <${CalendarDays} size=${14} /> Plan${planEntries.length > 0 ? ` (${planEntries.length})` : ""}
        </button>
        <button onClick=${() => setView("weight")} style=${{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "9px 0", borderRadius: 9, border: "none", background: view === "weight" ? "#fff" : "transparent", color: view === "weight" ? "#262220" : "#8A8175", fontSize: 13, fontWeight: 700, boxShadow: view === "weight" ? "0 1px 2px rgba(0,0,0,0.06)" : "none" }}>
          <${Scale} size=${14} /> Weight
        </button>
      </div>

      ${view === "log" ? logView : view === "plan" ? planView : weightView}
      ${settingsModal}
    </div>
  `;
}

function App() {
  const [user, setUser] = useState(null);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await storage.get("plateful:user");
        if (res && res.value) setUser(JSON.parse(res.value));
      } catch (e) {}
      setReady(true);
    })();
  }, []);

  async function handleSignIn(profile) {
    setUser(profile);
    try { await storage.set("plateful:user", JSON.stringify(profile)); } catch (e) {}
  }

  function handleSkip() {
    setUser({ name: null, guest: true });
  }

  async function handleSignOut() {
    setUser(null);
    try { window.localStorage.removeItem("plateful:user"); } catch (e) {}
  }

  if (!ready) return null;
  if (!user) return html`<${WelcomeScreen} onSignIn=${handleSignIn} onSkip=${handleSkip} />`;
  return html`<${MainApp} user=${user} onSignOut=${handleSignOut} />`;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(html`<${App} />`);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
